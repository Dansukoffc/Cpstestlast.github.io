<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>cpstestlastgd</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        :root {
            --bg-dark: #010102;
            --container-bg: rgba(5, 7, 12, 0.95);
            --card-bg: rgba(15, 18, 25, 0.98);
            --text-primary: #ffffff;
            --text-secondary: #667085;
            --accent: #00ffff;
            --left-hand: #ff3333;
            --right-hand: #33ff77;
            --error: #ff0055;
        }

        body {
            background: var(--bg-dark);
            font-family: 'Consolas', 'Monaco', monospace;
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        #three-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.6; }

        .app-container {
            position: relative; z-index: 1; max-width: 1200px; width: 98%; margin: 10px auto;
            background: var(--container-bg); backdrop-filter: blur(20px); border-radius: 15px;
            padding: 20px; border: 1px solid rgba(0, 255, 255, 0.1);
            display: grid; grid-template-columns: 1fr 320px; gap: 15px;
        }

        .main-col { display: flex; flex-direction: column; gap: 10px; }

        .header { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        .mode-btn { background: #111; border: 1px solid #333; color: #555; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .mode-btn.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .stat-card { background: var(--card-bg); padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .stat-val { font-size: 1.8rem; font-weight: 900; display: block; color: var(--accent); }
        .stat-lbl { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; }

        .graph-wrap { background: #000; border-radius: 10px; position: relative; border: 2px solid #111; height: 320px; overflow: hidden; }
        #clickChart { width: 100%; height: 100%; }

        .settings { background: var(--card-bg); padding: 15px; border-radius: 10px; display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; border: 1px solid #222; }
        .set-box { display: flex; flex-direction: column; gap: 4px; }
        .k-btn { background: #000; border: 1px solid #444; color: var(--accent); padding: 8px; border-radius: 6px; text-align: center; cursor: pointer; font-weight: bold; }
        .k-btn.waiting { border-color: var(--error); color: var(--error); animation: pulse 0.6s infinite; }
        .inp { background: #000; border: 1px solid #333; color: #fff; padding: 6px; border-radius: 4px; width: 100%; outline: none; }

        /* Панель Жесткого Тренера */
        .coach-panel { background: rgba(0, 0, 0, 0.8); border-radius: 10px; padding: 15px; display: flex; flex-direction: column; gap: 12px; border: 1px solid #333; height: 100%; overflow-y: auto; }
        .coach-title { color: var(--error); font-weight: bold; font-size: 0.9rem; border-bottom: 2px solid var(--error); padding-bottom: 5px; }
        .coach-msg { font-size: 0.85rem; line-height: 1.4; color: #ff8888; font-style: italic; }
        
        .raw-data { margin-top: 10px; font-size: 0.75rem; color: #888; border-top: 1px solid #222; padding-top: 10px; }
        .raw-line { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .raw-line span:last-child { color: #fff; }

        @keyframes pulse { 50% { opacity: 0.3; } }
        .countdown { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; font-size: 10rem; font-weight: 900; z-index: 1000; color: var(--error); }
    </style>
</head>
<body>

<canvas id="three-canvas"></canvas>

<div class="app-container">
    <div class="main-col">
        <div class="header">
            <div style="display: flex; gap: 5px;">
                <button class="mode-btn active" id="mNormal">NORMAL</button>
                <button class="mode-btn" id="mLine">RHYTHM</button>
            </div>
            <div style="display: flex; gap: 5px;">
                <button class="mode-btn active" id="hOne">1 HAND</button>
                <button class="mode-btn" id="hTwo">2 HANDS</button>
            </div>
            <select id="durSel" class="mode-btn">
                <option value="5">5s</option>
                <option value="10" selected>10s</option>
                <option value="30">30s</option>
                <option value="0">∞</option>
            </select>
        </div>

        <div class="stats-row">
            <div class="stat-card"><span class="stat-lbl">CPS</span><span id="vCPS" class="stat-val">0.0</span></div>
            <div class="stat-card"><span class="stat-lbl">Accuracy</span><span id="vAcc" class="stat-val">0%</span></div>
            <div class="stat-card"><span class="stat-lbl">Stability</span><span id="vStab" class="stat-val">0%</span></div>
        </div>

        <div class="graph-wrap">
            <canvas id="clickChart"></canvas>
        </div>

        <div class="settings">
            <div class="set-box"><span class="stat-lbl">START BIND</span><div id="bStart" class="k-btn">F3</div></div>
            <div class="set-box"><span class="stat-lbl">KEY 1 (LEFT)</span><div id="bLeft" class="k-btn">Space</div></div>
            <div class="set-box" id="boxRight" style="opacity:0.2;pointer-events:none;"><span class="stat-lbl">KEY 2 (RIGHT)</span><div id="bRight" class="k-btn">L</div></div>
            <div class="set-box"><span class="stat-lbl">BPM INTERVAL</span><input type="number" id="inInt" class="inp" value="400"></div>
            <div class="set-box"><span class="stat-lbl">HOLD MS</span><input type="number" id="inHold" class="inp" value="80"></div>
        </div>
    </div>

    <div class="coach-panel">
        <div class="coach-title">CRITICAL ANALYZER</div>
        <div id="coachText" class="coach-msg">Ожидание запуска. Посмотрим, на что ты способен...</div>
        
        <div class="raw-data" id="rawData">
            <div class="raw-line"><span>Ratio L/R:</span> <span id="rRatio">0/0</span></div>
            <div class="raw-line"><span>Avg Hold:</span> <span id="rHold">0ms</span></div>
            <div class="raw-line"><span>Jitter:</span> <span id="rJitter">0ms</span></div>
            <div class="raw-line"><span>Misses:</span> <span id="rMiss">0</span></div>
        </div>
    </div>
</div>

<script>
    /** --- BACKGROUND ENGINE --- **/
    const tScene = new THREE.Scene();
    const tCam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const tRenderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
    tRenderer.setSize(window.innerWidth, window.innerHeight);

    const joints = [];
    const geom = new THREE.IcosahedronGeometry(1, 0);
    for(let i=0; i<30; i++) {
        const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.1 });
        const m = new THREE.Mesh(geom, mat);
        m.position.set((Math.random()-0.5)*60, (Math.random()-0.5)*60, -Math.random()*100);
        m.userData = { spd: 0.1 + Math.random()*0.2 };
        tScene.add(m); joints.push(m);
    }
    tCam.position.z = 20;

    function animBackground() {
        requestAnimationFrame(animBackground);
        joints.forEach(j => {
            j.rotation.x += 0.01; j.rotation.y += 0.01;
            j.position.z += j.userData.spd;
            if(j.position.z > 20) j.position.z = -100;
        });
        tRenderer.render(tScene, tCam);
    }
    animBackground();

    /** --- LOGIC --- **/
    let state = {
        active: false, mode: 'normal', hands: 'one',
        keys: { start: 'F3', left: ' ', right: 'l' },
        targets: [], clicks: [],
        startT: 0, curDur: 10000,
        held: { left: false, right: false },
        analysis: { late: 0, early: 0, hits: 0, total: 0, misses: 0 }
    };

    const canvas = document.getElementById('clickChart');
    const ctx = canvas.getContext('2d');

    let bindTarget = null;
    document.querySelectorAll('.k-btn').forEach(b => {
        b.onclick = () => { bindTarget = b.id; b.classList.add('waiting'); b.innerText = "PRESS KEY"; };
    });

    window.addEventListener('keydown', (e) => {
        if(bindTarget) {
            const map = { bStart: 'start', bLeft: 'left', bRight: 'right' };
            state.keys[map[bindTarget]] = e.key;
            document.getElementById(bindTarget).innerText = e.key === ' ' ? 'SPACE' : e.key.toUpperCase();
            document.getElementById(bindTarget).classList.remove('waiting');
            bindTarget = null; return;
        }
        if(e.key === state.keys.start) { state.active ? stopTest() : startCountdown(); return; }
        if(state.active) {
            if(e.key === state.keys.left && !state.held.left) { press('left'); state.held.left = true; }
            if(state.hands === 'two' && e.key === state.keys.right && !state.held.right) { press('right'); state.held.right = true; }
        }
    });

    window.addEventListener('keyup', (e) => {
        if(!state.active) return;
        if(e.key === state.keys.left) { release('left'); state.held.left = false; }
        if(state.hands === 'two' && e.key === state.keys.right) { release('right'); state.held.right = false; }
    });

    function startCountdown() {
        let c = 3;
        const div = document.createElement('div'); div.className = 'countdown'; document.body.appendChild(div);
        const selVal = parseInt(document.getElementById('durSel').value);
        state.curDur = selVal === 0 ? 0 : selVal * 1000;
        if(state.mode === 'line') generateTargets();
        const t = setInterval(() => {
            div.innerText = c > 0 ? c : "GO!";
            if(c === -1) { clearInterval(t); div.remove(); startTest(); }
            c--;
        }, 800);
    }

    function generateTargets() {
        state.targets = [];
        const interval = parseInt(document.getElementById('inInt').value) || 400;
        const h = parseInt(document.getElementById('inHold').value) || 80;
        const limit = state.curDur === 0 ? 60000 : state.curDur;
        let t = 1000;
        while(t < limit - 500) {
            state.targets.push({ t, dur: h, hand: state.hands === 'two' ? (state.targets.length % 2 ? 'right' : 'left') : 'left', hit: false });
            t += interval;
        }
    }

    function startTest() {
        state.clicks = []; state.active = true; state.startT = performance.now();
        state.analysis = { late: 0, early: 0, hits: 0, total: 0, misses: 0 };
        if(state.curDur > 0) setTimeout(() => { if(state.active) stopTest(); }, state.curDur);
    }

    function stopTest() { state.active = false; analyzeGame(true); }

    function press(hand) {
        const now = performance.now() - state.startT;
        state.clicks.push({ start: now, end: null, hand });
        if(state.mode === 'line') {
            const target = state.targets.find(t => !t.hit && Math.abs(t.t - now) < 200);
            if(target && (state.hands === 'one' || target.hand === hand)) {
                target.hit = true; state.analysis.hits++;
            } else { state.analysis.misses++; }
            state.analysis.total++;
        }
        analyzeGame();
    }

    function release(hand) {
        const now = performance.now() - state.startT;
        const last = state.clicks.slice().reverse().find(c => c.hand === hand && c.end === null);
        if(last) last.end = now;
        analyzeGame();
    }

    function analyzeGame(finished = false) {
        const now = performance.now() - state.startT;
        const lClicks = state.clicks.filter(c => c.hand === 'left').length;
        const rClicks = state.clicks.filter(c => c.hand === 'right').length;
        const total = lClicks + rClicks;

        // Stats UI
        document.getElementById('vCPS').innerText = (total / (now/1000)).toFixed(1);
        document.getElementById('rRatio').innerText = `${lClicks} / ${rClicks}`;
        
        // Stability calculation (Stricter)
        let stability = 0;
        if(state.clicks.length > 5) {
            const ivs = [];
            for(let i=1; i<state.clicks.length; i++) ivs.push(state.clicks[i].start - state.clicks[i-1].start);
            const avg = ivs.reduce((a,b)=>a+b,0) / ivs.length;
            const jitter = Math.sqrt(ivs.reduce((a,b)=>a+Math.pow(b-avg,2),0) / ivs.length);
            document.getElementById('rJitter').innerText = Math.round(jitter) + 'ms';
            stability = Math.max(0, 100 - (jitter / 0.8)); // Harder threshold
        }
        document.getElementById('vStab').innerText = Math.round(stability) + '%';

        // Hold duration
        const finishedClicks = state.clicks.filter(c => c.end !== null);
        const avgHold = finishedClicks.length ? finishedClicks.reduce((a,b)=>a+(b.end-b.start),0)/finishedClicks.length : 0;
        document.getElementById('rHold').innerText = Math.round(avgHold) + 'ms';

        // Coach Harsh Messages
        const coach = document.getElementById('coachText');
        let msg = "";
        
        if(state.hands === 'two' && total > 10) {
            const diff = Math.abs(lClicks - rClicks) / total;
            if(diff > 0.25) msg += "Ужасный баланс рук! Одна рука ленится. ";
        }
        if(avgHold > 0 && avgHold < 40) msg += "Слишком короткие клики, система их не засчитает. ";
        if(avgHold > 200) msg += "Ты слишком долго держишь клавишу, тормозишь CPS. ";
        if(stability < 60 && total > 10) msg += "Твой ритм полностью разбит. Ты кликаешь как в лихорадке. ";
        
        if(finished && stability > 90 && lClicks === rClicks) msg = "Идеально. Ты машина.";
        else if(!msg) msg = "Пока терпимо. Но старайся лучше.";
        
        coach.innerText = msg;
    }

    function draw() {
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        ctx.clearRect(0,0,canvas.width, canvas.height);
        
        const now = state.active ? (performance.now() - state.startT) : 0;
        const viewMs = 3000;
        const centerX = canvas.width / 2;
        const getX = (t) => centerX + (t - now) * (canvas.width / viewMs);

        // Grid
        ctx.strokeStyle = '#111';
        for(let i=-10; i<10; i++) {
            const gx = getX(Math.floor(now/500)*500 + i*500);
            ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, canvas.height); ctx.stroke();
        }

        // Targets (Line mode)
        if (state.mode === 'line') {
            state.targets.forEach(t => {
                const x = getX(t.t);
                if(x < -50 || x > canvas.width + 50) return;
                ctx.strokeStyle = t.hit ? '#222' : (t.hand === 'left' ? varColor('--left-hand') : varColor('--right-hand'));
                ctx.lineWidth = 3;
                ctx.strokeRect(x, 50, 5, canvas.height - 100);
            });
        }

        // Clicks (BRIGHT NEON)
        state.clicks.forEach(c => {
            const x = getX(c.start);
            const w = (( (c.end || now) - c.start) / viewMs) * canvas.width;
            const color = c.hand === 'left' ? '#ff3333' : '#33ff77';
            
            ctx.shadowBlur = 15; ctx.shadowColor = color;
            ctx.fillStyle = color;
            // Draw as a glowing bar
            ctx.fillRect(x, canvas.height/2 - 20, Math.max(w, 10), 40);
            ctx.shadowBlur = 0;
        });

        // FIXED CROSSHAIR
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 4;
        ctx.shadowBlur = 20; ctx.shadowColor = '#0ff';
        ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height); ctx.stroke();
        // Crosshair Box
        ctx.strokeRect(centerX - 15, canvas.height/2 - 15, 30, 30);
        ctx.shadowBlur = 0;

        requestAnimationFrame(draw);
    }
    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }
    draw();

    document.getElementById('mNormal').onclick = () => { state.mode = 'normal'; updateUI(); };
    document.getElementById('mLine').onclick = () => { state.mode = 'line'; updateUI(); };
    document.getElementById('hOne').onclick = () => { state.hands = 'one'; updateUI(); };
    document.getElementById('hTwo').onclick = () => { state.hands = 'two'; updateUI(); };

    function updateUI() {
        document.getElementById('mNormal').classList.toggle('active', state.mode==='normal');
        document.getElementById('mLine').classList.toggle('active', state.mode==='line');
        document.getElementById('hOne').classList.toggle('active', state.hands==='one');
        document.getElementById('hTwo').classList.toggle('active', state.hands==='two');
        document.getElementById('boxRight').style.opacity = state.hands==='two'?'1':'0.2';
        document.getElementById('boxRight').style.pointerEvents = state.hands==='two'?'all':'none';
        state.active = false;
    }
</script>
</body>
</html>
